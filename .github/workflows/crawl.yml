name: KEPCO Crawl
run-name: "KEPCO Crawl (스레드 ${{ inputs.thread || 'cron' }})"

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'crawl_jobs ID (0=자동)'
        required: true
        type: string
      thread:
        description: '스레드 번호 (1/2/3)'
        required: false
        default: '1'
        type: string

  schedule:
    # 매 5분 — dispatch 실패 등 어떤 사고든 5분 안에 자동 픽업하는 안전망.
    # find_next_job 이 작업 없으면 즉시 종료하므로 부담 미미 (public repo 무료).
    - cron: '*/5 * * * *'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    concurrency:
      group: kepco-crawl-${{ matrix.thread }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        # dispatch: 지정 스레드만 / cron: 3개 모두
        thread: ${{ github.event_name == 'schedule' && fromJSON('[1, 2, 3]') || fromJSON(format('[{0}]', inputs.thread || '1')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: cd crawler && python run_crawl.py --job-id=${{ inputs.job_id || '0' }} --thread=${{ matrix.thread }}
