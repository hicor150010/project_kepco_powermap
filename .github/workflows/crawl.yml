name: KEPCO Crawl
run-name: "KEPCO Crawl (스레드 ${{ inputs.thread }})"

# 2중 제어 모델: 이 워크플로는 수동 dispatch 만 받는다.
# - API(/api/admin/crawl POST) 와 Worker(/api/reconcile) 와 크롤러(auto_continue) 가 dispatch 함
# - 과거의 '*/5 * * * *' cron 안전망은 제거됨 (유령 Job 부활 원인)
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'crawl_jobs ID (필수)'
        required: true
        type: string
      thread:
        description: '스레드 번호 (1/2/3/4/5)'
        required: true
        default: '1'
        type: string

jobs:
  crawl:
    name: "수집기 ${{ matrix.thread }}"
    runs-on: ubuntu-latest
    timeout-minutes: 350

    concurrency:
      group: kepco-crawl-${{ matrix.thread }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        thread: ${{ fromJSON(format('[{0}]', inputs.thread)) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: cd crawler && python run_crawl.py --job-id=${{ inputs.job_id }} --thread=${{ matrix.thread }}
