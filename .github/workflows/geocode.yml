name: KEPCO Geocode

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["KEPCO Crawl"]
    types: [completed]
  schedule:
    # 매주 일요일 05:00 KST (토요일 20:00 UTC) — 크롤링 2시간 후
    - cron: '0 20 * * 0'

jobs:
  geocode:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r geocoder/requirements.txt

      - name: Run geocoder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          VWORLD_KEY: ${{ secrets.VWORLD_KEY }}
        run: cd geocoder && python geocode_worker.py
